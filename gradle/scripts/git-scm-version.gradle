import java.time.LocalDateTime
import java.time.format.DateTimeFormatter
//import org.gradle.internal.service.ServiceRegistry

def execOps = project.services.get(org.gradle.process.ExecOperations)

ext {
    // git describe
    def stdoutName = new ByteArrayOutputStream()
    execOps.exec {
        it.commandLine 'git', 'describe', '--tags', '--match', 'v[0-9.rc]*', '--dirty'
        it.standardOutput = stdoutName
        it.ignoreExitValue = true
    }

    gitVersionName = stdoutName.toString().trim()

    // Date from last commit
    def stdoutDate = new ByteArrayOutputStream()
    execOps.exec {
        it.commandLine 'git', 'log', '-1', '--format=%cI'
        it.standardOutput = stdoutDate
        it.ignoreExitValue = true
    }

    def commitDateString = stdoutDate.toString().trim()
    def date = commitDateString.isEmpty() ?
            LocalDateTime.now() :
            LocalDateTime.parse(commitDateString, DateTimeFormatter.ISO_OFFSET_DATE_TIME)

    def hh = date.hour
    def mm = date.minute
    def hhmm = Math.round((hh * 4) + (mm / 15)).toString().padLeft(2, '0')
    def yyyyMMdd = date.format(DateTimeFormatter.ofPattern("yyyyMMdd"))

    gitVersionCode = Integer.parseInt(yyyyMMdd + hhmm)
}

tasks.register('printVersion') {
    doFirst {
        println "Version Name: $gitVersionName"
        println "Version Code: $gitVersionCode"
    }
}
